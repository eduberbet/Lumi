<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMI - Pinky (Fase 4.6)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="lumi-container">
            <div id="lumi-focus" class="lumi-off"></div>
            <p id="lumi-status">Sintonizando...</p>
        </div>
        
        <div id="chat-container">
            <div id="messages"></div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Pergunte à Lumi..." autocomplete="off">
                
                <div class="botoes-acao">
                    <button id="stt-btn" title="Segure para falar">🎙️</button>
                    
                    <button id="send-btn" title="Enviar texto">🚀</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
